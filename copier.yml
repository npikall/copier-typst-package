# CONFIGURATION -------------------------
_min_copier_version: "9"
_envops:
  autoescape: false
  keep_trailing_newline: true
_subdirectory: template
_templates_suffix: .jinja

# PROMPT --------------------------------
project:
  type: str
  help: Set the project name

git_user:
  type: str
  help: Set the Git User Name
  default: "{{ 'npikall' }}"

git_email:
  type: str
  help: Set the Git Email
  default: "{{ 'example@email.com' }}"

copyright_license:
  type: str
  help: Choose a License
  default: MIT
  choices:
    Apache License 2.0: Apache-2.0
    MIT License: MIT
    The Unlicense: Unlicense
    None: None

# NEVER PROMPT -------------------------
project_slug:
  type: str
  when: false
  default: "{{ project | string | lower | replace(' ', '-') }}"
